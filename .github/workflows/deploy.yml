name: Build and Publish Docker Image

# Il workflow si attiva ad ogni push sul ramo 'main'
on:
  push:
    branches: [ "main" ]

# Permessi minimi richiesti per poter scrivere nei GitHub Packages
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il codice del repository all'interno del container della CI
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configura l'ambiente Java (JDK 17 o la versione che usi in Spring)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Velocizza i build successivi memorizzando le dipendenze

      # 3. Compila il progetto con Maven e genera il file .jar (saltando i test per velocizzare)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Effettua il login al registro dei pacchetti di GitHub (GHCR)
      # Usa il token temporaneo automatico 'GITHUB_TOKEN' fornito da GitHub stesso
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Estrae i metadati (tag, label) per rendere l'immagine Docker tracciabile
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,value={{sha}}

      # 6. Compila il Dockerfile (usando il JAR appena creato) e fa il push nei Package
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ std_steps.meta.outputs.tags }}
          labels: ${{ std_steps.meta.outputs.labels }}