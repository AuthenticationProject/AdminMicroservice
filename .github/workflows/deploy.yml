name: Docker Image CI for GHCR
on:
  push
jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build and push the image
        run :  docker buildx build . --platform=linux/amd64,linux/arm64 -t ghcr.io/authenticationproject/adminmicroservice:latest --push
